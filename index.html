<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Конвертер</title>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/index.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        }
        .input-group:focus-within label {
            color: #2563eb;
        }
        .input-group:focus-within .input-icon {
            color: #2563eb;
        }
        /* Скрываем стрелки у input type number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Modal styles */
        .modal-backdrop {
            transition: opacity 0.2s ease-out;
        }
        .modal-content {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease-out;
        }
        .coffee-icon {
            stroke-dasharray: 100;
            stroke-dashoffset: 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-700 relative">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 p-6 animate-fade-in z-10">
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="p-2 bg-primary-50 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 8h6M9 16h6" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">RFID Конвертер</h2>
        </div>

        <div class="space-y-5">
            <div class="input-group relative">
                <label for="decimal" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5 transition-colors">Десятичный код (Decimal)</label>
                <div class="relative">
                    <input type="text" id="decimal" placeholder="Например: 2426426" 
                        class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
                    <svg class="input-icon absolute left-3 top-3 h-4 w-4 text-slate-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                    </svg>
                    <button onclick="copyToClipboard('decimal')" class="absolute right-3 top-2.5 text-slate-400 hover:text-primary-600 transition-colors" title="Копировать">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="input-group relative">
                <label for="hex" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5 transition-colors">Шестнадцатеричный код (Hex)</label>
                <div class="relative">
                    <input type="text" id="hex" placeholder="Например: 002506BA" 
                        class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all uppercase">
                    <svg class="input-icon absolute left-3 top-3 h-4 w-4 text-slate-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                    <button onclick="copyToClipboard('hex')" class="absolute right-3 top-2.5 text-slate-400 hover:text-primary-600 transition-colors" title="Копировать">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="input-group relative">
                <label for="text" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5 transition-colors">Текстовый код (Facility, Card)</label>
                <div class="relative">
                    <input type="text" id="text" placeholder="Например: 37,00094" 
                        class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all">
                    <svg class="input-icon absolute left-3 top-3 h-4 w-4 text-slate-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    <button onclick="copyToClipboard('text')" class="absolute right-3 top-2.5 text-slate-400 hover:text-primary-600 transition-colors" title="Копировать">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="relative pt-2">
                <div class="absolute inset-0 flex items-center" aria-hidden="true">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="px-2 bg-white text-xs font-medium text-slate-400">Или раздельно</span>
                </div>
            </div>

            <div class="input-group">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Текстовый код (раздельно)</label>
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="facility" placeholder="Facility" maxlength="6" 
                            class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-center">
                    </div>
                    <span class="text-slate-400 font-bold text-lg select-none">,</span>
                    <div class="relative flex-1">
                        <input type="text" id="card" placeholder="Card (00000)" maxlength="5" 
                            class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-center">
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 flex items-center justify-between">
            <div class="flex items-center gap-2 text-xs text-slate-500">
                <svg class="h-4 w-4 text-green-500 animate-pulse-slow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <span>Автоконвертация</span>
            </div>
            <button onclick="clearAll()" class="text-xs font-semibold text-slate-500 hover:text-red-500 transition-colors flex items-center gap-1 px-3 py-1.5 rounded-md hover:bg-red-50">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                Очистить
            </button>
        </div>

        <!-- Блок автора -->
        <div class="mt-8 pt-6 border-t border-slate-100">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-400">
                <div class="flex flex-col items-center sm:items-start gap-1">
                    <span class="font-medium text-slate-600">Разработано с ❤️</span>
                    <a href="mailto:dev@example.com" class="hover:text-primary-600 transition-colors">dev@example.com</a>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="openModal()" class="group flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 hover:bg-[#FFDD00]/10 border border-slate-200 hover:border-[#FFDD00] rounded-full transition-all duration-300 cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-[#FFDD00] transition-colors coffee-icon">
                          <!-- Чашка и блюдце -->
                          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8h2a2 2 0 012 2v2a2 2 0 01-2 2h-2m0 0V8m0 6a4 4 0 01-4 4H7a4 4 0 01-4-4V8h14v6zM3 20h14" />
                          <!-- Пар / Дымок -->
                          <path stroke-linecap="round" stroke-linejoin="round" d="M6 4c.5-1 1.5-1 2 0s1.5 1 2 0M10 4c.5-1 1.5-1 2 0s1.5 1 2 0" />
                        </svg>
                        <span class="group-hover:text-slate-700 transition-colors">Поддержать</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно поддержки -->

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />

    <script>
        const inputs = {
            decimal: document.getElementById('decimal'),
            hex: document.getElementById('hex'),
            text: document.getElementById('text'),
            facility: document.getElementById('facility'),
            card: document.getElementById('card')
        };

        function formatTextCode(facility, card) {
            const formattedCard = String(card || 0).padStart(5, '0');
            return `${facility},${formattedCard}`;
        }

        function parseTextCode(value) {
            const parts = value.trim().split(',');
            if (parts.length >= 1) {
                const facility = parseInt(parts[0], 10) || 0;
                let cardStr = parts[1] || '0';
                // Исправлено: padStart вместо padEnd для корректного дополнения нулями слева
                if (cardStr.length < 5) cardStr = cardStr.padStart(5, '0');
                const cardNumber = parseInt(cardStr, 10) || 0;
                return { facility, cardNumber };
            }
            return { facility: 0, cardNumber: 0 };
        }

        function updateSplitInputs(facility, card) {
            inputs.facility.value = facility;
            inputs.card.value = String(card).padStart(5, '0');
        }

        function convert(source) {
            let decimalVal = 0;
            let facility = 0;
            let cardNumber = 0;

            try {
                if (source === 'decimal') {
                    const val = inputs.decimal.value.trim();
                    if (val === '') { clearFields('decimal'); return; }
                    decimalVal = parseInt(val, 10);
                } 
                else if (source === 'hex') {
                    const val = inputs.hex.value.trim();
                    if (val === '') { clearFields('hex'); return; }
                    decimalVal = parseInt(val, 16);
                } 
                else if (source === 'text') {
                    const val = inputs.text.value.trim();
                    if (val === '') { clearFields('text'); return; }
                    const parsed = parseTextCode(val);
                    facility = parsed.facility;
                    cardNumber = parsed.cardNumber;
                    decimalVal = (facility * 65536) + cardNumber;
                }
                else if (source === 'split') {
                    const facVal = inputs.facility.value.trim();
                    const cardVal = inputs.card.value.trim();
                    if (facVal === '' && cardVal === '') { clearFields('split'); return; }
                    
                    facility = parseInt(facVal, 10) || 0;
                    const cardStr = (cardVal || '0').padStart(5, '0');
                    cardNumber = parseInt(cardStr, 10) || 0;
                    decimalVal = (facility * 65536) + cardNumber;
                }

                if (isNaN(decimalVal) || decimalVal < 0) {
                    if (!['text', 'split'].includes(source)) clearFields(source);
                    return;
                }

                if (source !== 'decimal') inputs.decimal.value = decimalVal;
                if (source !== 'hex') inputs.hex.value = decimalVal.toString(16).toUpperCase().padStart(8, '0');
                
                facility = Math.floor(decimalVal / 65536);
                cardNumber = decimalVal % 65536;
                
                if (source !== 'text') {
                    inputs.text.value = formatTextCode(facility, cardNumber);
                }
                if (source !== 'split') {
                    updateSplitInputs(facility, cardNumber);
                }

            } catch (e) {
                console.error('Conversion error:', e);
            }
        }

        function clearFields(except) {
            if (except !== 'decimal') inputs.decimal.value = '';
            if (except !== 'hex') inputs.hex.value = '';
            if (except !== 'text') inputs.text.value = '';
            if (except !== 'split') {
                inputs.facility.value = '';
                inputs.card.value = '';
            }
        }

        function clearAll() {
            inputs.decimal.value = '';
            inputs.hex.value = '';
            inputs.text.value = '';
            inputs.facility.value = '';
            inputs.card.value = '';
            inputs.decimal.focus();
        }

        function copyToClipboard(fieldId) {
            const el = document.getElementById(fieldId);
            if (el.value) {
                navigator.clipboard.writeText(el.value).then(() => {
                    const originalBg = el.style.backgroundColor;
                    el.style.backgroundColor = '#dcfce7';
                    setTimeout(() => {
                        el.style.backgroundColor = originalBg;
                    }, 300);
                });
            }
        }

        // Modal Logic
        const modal = document.getElementById('support-modal');
        const modalContent = modal.querySelector('.modal-content');
        const modalBackdrop = modal.querySelector('.modal-backdrop');

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Small delay to allow display:flex to apply before animating opacity
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
                modalBackdrop.classList.remove('opacity-0');
                modalBackdrop.classList.add('opacity-100');
            }, 10);
        }

        function closeModal() {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            modalBackdrop.classList.remove('opacity-100');
            modalBackdrop.classList.add('opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        inputs.decimal.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            convert('decimal');
        });

        inputs.hex.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9A-Fa-f]/g, '').toUpperCase();
            convert('hex');
        });

        inputs.text.addEventListener('input', () => convert('text'));
        
        inputs.facility.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            convert('split');
        });

        inputs.card.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            convert('split');
        });
        
        inputs.text.addEventListener('blur', (e) => {
            if (e.target.value.trim() !== '') {
                const { facility, cardNumber } = parseTextCode(e.target.value);
                e.target.value = formatTextCode(facility, cardNumber);
            }
        });
        
        inputs.card.addEventListener('blur', (e) => {
            if (e.target.value.trim() !== '') {
                e.target.value = (e.target.value || '0').padStart(5, '0');
            }
        });

        inputs.facility.addEventListener('blur', (e) => {
            if (e.target.value.trim() !== '') {
                e.target.value = parseInt(e.target.value, 10) || 0;
            }
        });
    </script>
